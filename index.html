<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenta CRM - All-in-One</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a',
                        },
                        sidebar: '#1e293b',
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- React and Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes scale-in {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
        .animate-scale-in { animation: scale-in 0.2s ease-out forwards; }
        .animate-slide-up { animation: slide-up 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const { 
            AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, BarChart, Bar, Cell 
        } = Recharts;

        // --- Lucide Icon Wrapper ---
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        targets: [iconRef.current],
                        icons: lucide.icons
                    });
                }
            }, [name]);
            return <i ref={iconRef} data-lucide={name} className={className} {...props}></i>;
        };

        // --- Constants & Types ---
        const LeadStatus = {
            NEW: 'New',
            CONTACTED: 'Contacted',
            QUALIFIED: 'Qualified',
            LOST: 'Lost'
        };

        const DealStage = {
            PROSPECTING: 'Prospecting',
            NEGOTIATION: 'Negotiation',
            CLOSED_WON: 'Closed Won'
        };

        const DEMO_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQAVnBplRDIA6F9f5y0fJz9vqRzKRjIsoPp1sPMmO9X-C7JYRqQN4ID1GV1qZ2dv7UdlKWi5kWeS9Xt/pub?gid=0&single=true&output=csv";
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwAbcTVUr2i9V3Ld5vLE7_d-w9HYoHKqM0H5ik-UkCLrYa8-bl8m8iKTTv7u-ThyfREEw/exec';

        // --- Services ---
        const authenticateUser = async (email, pass, sheetUrl) => {
            try {
                const response = await fetch(sheetUrl);
                if (!response.ok) throw new Error("Failed to fetch Google Sheet.");
                const text = await response.text();
                const rows = text.split('\n').map(row => row.split(',').map(c => c.trim()));
                if (rows.length < 2) return null;

                const headers = rows[0].map(h => h.toLowerCase());
                const emailIdx = headers.findIndex(h => h.includes('email'));
                const passIdx = headers.findIndex(h => h.includes('password'));
                const nameIdx = headers.findIndex(h => h.includes('name'));
                const roleIdx = headers.findIndex(h => h.includes('role'));

                const userRow = rows.slice(1).find(row => 
                    row[emailIdx]?.toLowerCase() === email.toLowerCase() && row[passIdx] === pass
                );

                if (userRow) {
                    return {
                        email: userRow[emailIdx],
                        name: userRow[nameIdx] || userRow[emailIdx].split('@')[0],
                        role: userRow[roleIdx] || 'User',
                        avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(userRow[nameIdx] || 'User')}&background=0D8ABC&color=fff`
                    };
                }
                return null;
            } catch (error) {
                console.error("Auth Error:", error);
                throw error;
            }
        };

        const saveLeadToSheet = async (lead) => {
            if (!SCRIPT_URL) return false;
            try {
                const formData = new FormData();
                Object.keys(lead).forEach(key => formData.append(key, lead[key]));
                formData.append('timestamp', new Date().toISOString());
                await fetch(SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' });
                return true;
            } catch (error) {
                console.error("Error saving to sheet:", error);
                return false;
            }
        };

        // --- Components ---

        const Login = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                setError('');
                try {
                    const user = await authenticateUser(email, password, DEMO_SHEET_URL);
                    if (user) onLogin(user);
                    else setError('Invalid email or password.');
                } catch (err) {
                    setError('Login failed. Please check your connection.');
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
                    <div className="sm:mx-auto sm:w-full sm:max-w-md animate-fade-in">
                        <div className="flex justify-center items-center mb-6">
                            <Icon name="hexagon" className="w-10 h-10 text-blue-600 fill-blue-100 mr-2" />
                            <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight">Zenta CRM</h2>
                        </div>
                        <h2 className="mt-2 text-center text-sm text-slate-600">Sign in to your account</h2>
                    </div>
                    <div className="mt-8 sm:mx-auto sm:w-full sm:max-w-md animate-slide-up">
                        <div className="bg-white py-8 px-4 shadow-xl rounded-2xl sm:px-10 border border-slate-100">
                            <form className="space-y-6" onSubmit={handleLogin}>
                                {error && <div className="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">{error}</div>}
                                <div>
                                    <label className="block text-sm font-medium text-slate-700">Email address</label>
                                    <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-slate-700">Password</label>
                                    <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm" />
                                </div>
                                <button type="submit" disabled={isLoading} className="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-70">
                                    {isLoading ? "Signing in..." : "Sign in"}
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        };

        const Sidebar = ({ currentView, setCurrentView, onLogout }) => {
            const menuItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'layout-dashboard' },
                { id: 'leads', label: 'Leads', icon: 'users' },
                { id: 'deals', label: 'Deals', icon: 'briefcase' },
                { id: 'contacts', label: 'Contacts', icon: 'contact' },
                { id: 'reports', label: 'Reports', icon: 'bar-chart-3' },
            ];

            return (
                <aside className="fixed top-0 left-0 h-full w-64 bg-sidebar text-white z-20 flex flex-col shadow-xl">
                    <div className="h-16 flex items-center px-6 border-b border-slate-700">
                        <Icon name="hexagon" className="w-8 h-8 text-blue-500 mr-3 fill-current" />
                        <span className="text-xl font-bold tracking-tight">Zenta CRM</span>
                    </div>
                    <nav className="flex-1 overflow-y-auto py-6 px-3 space-y-1">
                        {menuItems.map(item => (
                            <button key={item.id} onClick={() => setCurrentView(item.id)} className={`w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors ${currentView === item.id ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}>
                                <Icon name={item.icon} className="w-5 h-5 mr-3" />
                                {item.label}
                            </button>
                        ))}
                    </nav>
                    <div className="p-4 border-t border-slate-700">
                        <button onClick={onLogout} className="w-full flex items-center px-4 py-3 text-sm font-medium text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                            <Icon name="log-out" className="w-5 h-5 mr-3" />
                            Logout
                        </button>
                    </div>
                </aside>
            );
        };

        const Dashboard = () => {
            const data = [
                { name: 'Jan', sales: 4000, leads: 2400 },
                { name: 'Feb', sales: 3000, leads: 1398 },
                { name: 'Mar', sales: 2000, leads: 9800 },
                { name: 'Apr', sales: 2780, leads: 3908 },
                { name: 'May', sales: 1890, leads: 4800 },
                { name: 'Jun', sales: 2390, leads: 3800 },
                { name: 'Jul', sales: 3490, leads: 4300 },
            ];
            const pipelineData = [
                { name: 'Prospecting', value: 12 },
                { name: 'Qualified', value: 8 },
                { name: 'Proposal', value: 5 },
                { name: 'Negotiation', value: 3 },
            ];
            const COLORS = ['#94a3b8', '#60a5fa', '#3b82f6', '#1d4ed8'];

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="flex justify-between items-center mb-2">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Dashboard Overview</h2>
                            <p className="text-slate-500">Welcome back, here's what's happening today.</p>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {[
                            { label: 'Total Revenue', value: '$24,500', change: '+12%', icon: 'dollar-sign', color: 'text-emerald-600', bg: 'bg-emerald-100' },
                            { label: 'New Leads', value: '42', change: '+5%', icon: 'users', color: 'text-blue-600', bg: 'bg-blue-100' },
                            { label: 'Deals Pipeline', value: '28', change: '-2%', icon: 'briefcase', color: 'text-purple-600', bg: 'bg-purple-100' },
                            { label: 'Win Rate', value: '34%', change: '+4%', icon: 'trending-up', color: 'text-amber-600', bg: 'bg-amber-100' },
                        ].map((stat, idx) => (
                            <div key={idx} className="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
                                <div className="flex justify-between items-start">
                                    <div>
                                        <p className="text-sm font-medium text-slate-500">{stat.label}</p>
                                        <h3 className="text-2xl font-bold text-slate-800 mt-1">{stat.value}</h3>
                                    </div>
                                    <div className={`p-3 rounded-lg ${stat.bg}`}>
                                        <Icon name={stat.icon} className={`w-6 h-6 ${stat.color}`} />
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white p-6 rounded-xl shadow-sm border border-slate-100 h-96">
                            <h3 className="text-lg font-bold text-slate-800 mb-6">Revenue & Leads Trend</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <AreaChart data={data}>
                                    <XAxis dataKey="name" axisLine={false} tickLine={false} />
                                    <YAxis axisLine={false} tickLine={false} />
                                    <CartesianGrid vertical={false} stroke="#f1f5f9" />
                                    <Tooltip />
                                    <Area type="monotone" dataKey="sales" stroke="#3b82f6" fill="#3b82f6" fillOpacity={0.1} />
                                    <Area type="monotone" dataKey="leads" stroke="#10b981" fill="#10b981" fillOpacity={0.1} />
                                </AreaChart>
                            </ResponsiveContainer>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-100 h-96">
                            <h3 className="text-lg font-bold text-slate-800 mb-6">Deal Pipeline</h3>
                            <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={pipelineData} layout="vertical">
                                    <XAxis type="number" hide />
                                    <YAxis dataKey="name" type="category" width={90} tick={{fontSize: 11}} />
                                    <Tooltip />
                                    <Bar dataKey="value" radius={[0, 4, 4, 0]}>
                                        {pipelineData.map((entry, index) => <Cell key={index} fill={COLORS[index % COLORS.length]} />)}
                                    </Bar>
                                </BarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>
                </div>
            );
        };

        const LeadForm = ({ onSubmit, onCancel, isPublic = false }) => {
            const [formData, setFormData] = useState({
                customerName: '', dialingCode: '91', customerMobile: '', customerEmail: '',
                metalGroup: '', productCategory: '', description: '', budget: '', weight: '',
                source: '', leadGeneration: ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                const lead = {
                    id: Date.now().toString(),
                    name: formData.customerName,
                    company: `${formData.metalGroup} - ${formData.productCategory}`,
                    email: formData.customerEmail,
                    phone: `+${formData.dialingCode} ${formData.customerMobile}`,
                    status: LeadStatus.NEW,
                    source: formData.source || 'Direct',
                    avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(formData.customerName)}&background=random`,
                    ...formData
                };
                onSubmit(lead);
                if (isPublic) {
                    alert("Lead submitted successfully!");
                    setFormData({ customerName: '', dialingCode: '91', customerMobile: '', customerEmail: '', metalGroup: '', productCategory: '', description: '', budget: '', weight: '', source: '', leadGeneration: '' });
                }
            };

            const inputClasses = "w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-blue-500 outline-none";
            const labelClasses = "block text-xs font-semibold text-slate-500 uppercase mb-1.5";

            return (
                <form onSubmit={handleSubmit} className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="md:col-span-2">
                            <label className={labelClasses}>Customer name *</label>
                            <input required value={formData.customerName} onChange={e => setFormData({...formData, customerName: e.target.value})} className={inputClasses} />
                        </div>
                        <div>
                            <label className={labelClasses}>Mobile *</label>
                            <input required type="tel" value={formData.customerMobile} onChange={e => setFormData({...formData, customerMobile: e.target.value})} className={inputClasses} />
                        </div>
                        <div>
                            <label className={labelClasses}>Email</label>
                            <input type="email" value={formData.customerEmail} onChange={e => setFormData({...formData, customerEmail: e.target.value})} className={inputClasses} />
                        </div>
                        <div>
                            <label className={labelClasses}>Metal Group *</label>
                            <select required value={formData.metalGroup} onChange={e => setFormData({...formData, metalGroup: e.target.value})} className={inputClasses}>
                                <option value="">Choose</option>
                                <option value="Gold">Gold</option><option value="Diamond">Diamond</option><option value="Platinum">Platinum</option>
                            </select>
                        </div>
                        <div>
                            <label className={labelClasses}>Category *</label>
                            <select required value={formData.productCategory} onChange={e => setFormData({...formData, productCategory: e.target.value})} className={inputClasses}>
                                <option value="">Choose</option>
                                <option value="Ring">Ring</option><option value="Chain">Chain</option><option value="Coin">Coin</option>
                            </select>
                        </div>
                    </div>
                    <div className="flex justify-end gap-3 pt-4 border-t">
                        {onCancel && <button type="button" onClick={onCancel} className="text-slate-500 text-sm px-4">Cancel</button>}
                        <button type="submit" className="bg-blue-600 text-white px-6 py-2 rounded-lg shadow-lg">Create Lead</button>
                    </div>
                </form>
            );
        };

        const Leads = ({ leads, onNavigate }) => {
            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-center">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Sales Leads</h2>
                            <p className="text-slate-500">Manage customer enquiries.</p>
                        </div>
                        <button onClick={() => onNavigate('add-lead')} className="bg-blue-600 text-white px-4 py-2 rounded-lg flex items-center shadow-lg">
                            <Icon name="plus" className="w-5 h-5 mr-2" /> Add New Lead
                        </button>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead className="bg-slate-50 text-xs uppercase font-semibold text-slate-500">
                                <tr>
                                    <th className="px-6 py-4">Customer</th>
                                    <th className="px-6 py-4">Interest</th>
                                    <th className="px-6 py-4">Status</th>
                                    <th className="px-6 py-4">Phone</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {leads.map(lead => (
                                    <tr key={lead.id} className="hover:bg-slate-50">
                                        <td className="px-6 py-4 flex items-center">
                                            <img src={lead.avatar} className="w-8 h-8 rounded-full mr-3" />
                                            <div><div className="font-medium text-slate-900">{lead.name}</div><div className="text-xs text-slate-400">{lead.email}</div></div>
                                        </td>
                                        <td className="px-6 py-4">{lead.company}</td>
                                        <td className="px-6 py-4"><span className="px-2 py-0.5 rounded-full text-xs bg-blue-50 text-blue-700">{lead.status}</span></td>
                                        <td className="px-6 py-4 font-mono text-xs">{lead.phone}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [leads, setLeads] = useState([]);

            const handleAddLead = async (lead) => {
                setLeads(prev => [lead, ...prev]);
                setCurrentView('leads');
                await saveLeadToSheet(lead);
            };

            if (!user) return <Login onLogin={setUser} />;

            const renderContent = () => {
                switch (currentView) {
                    case 'dashboard': return <Dashboard />;
                    case 'leads': return <Leads leads={leads} onNavigate={setCurrentView} />;
                    case 'add-lead': return (
                        <div className="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow-lg border">
                            <h2 className="text-2xl font-bold mb-6">New Sales Lead</h2>
                            <LeadForm onSubmit={handleAddLead} onCancel={() => setCurrentView('leads')} />
                        </div>
                    );
                    default: return <div className="text-center py-20 text-slate-400">Coming Soon</div>;
                }
            };

            return (
                <div className="flex h-screen bg-slate-50">
                    <Sidebar currentView={currentView} setCurrentView={setCurrentView} onLogout={() => setUser(null)} />
                    <main className="flex-1 ml-64 flex flex-col h-screen overflow-hidden">
                        <header className="h-16 bg-white border-b flex items-center justify-between px-8 shadow-sm">
                            <div className="text-sm font-semibold text-slate-800">Welcome, {user.name}</div>
                            <img src={user.avatar} className="w-9 h-9 rounded-full border-2 border-white shadow-sm" />
                        </header>
                        <div className="flex-1 overflow-auto p-8">{renderContent()}</div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
